<h2>UI 美化 — 你希望从哪些方面入手？</h2>
<p class="subtitle">选择你最想改善的 UI 区域（可多选）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="menu" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>菜单与设置界面</h3>
      <p>欢迎菜单、模式选择、设置页面的排版、配色、字体、按钮样式</p>
    </div>
  </div>
  <div class="option" data-choice="game" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>游戏内 HUD</h3>
      <p>右侧信息栏（分数、道具、时间）、棋盘边框、蛇身渲染、道具贴图</p>
    </div>
  </div>
  <div class="option" data-choice="effects" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>动态特效与动画</h3>
      <p>粒子特效（吃食物爆炸、死亡粒子）、屏幕过渡、事件动画、蛇移动拖尾</p>
    </div>
  </div>
  <div class="option" data-choice="events" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>随机事件 UI 强化</h3>
      <p>轰炸区更明显的边界、预警UI升级（屏幕边缘红闪）、箭雨方向指示线</p>
    </div>
  </div>
  <div class="option" data-choice="overall" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>整体视觉风格统一</h3>
      <p>全局配色方案、字体系统、间距规范、界面元素统一圆角/阴影风格</p>
    </div>
  </div>
</div>
